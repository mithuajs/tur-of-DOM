<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Event bubble</title>
    <style>
         body{
            border: 2px solid red;
            margin: 2px;

         }
         section{
           
            border: 2px solid rgb(40, 44, 167);
            margin: 2px;

         }
         ol{
           
            border: 2px solid rgb(42, 176, 216);
            margin: 2px;

         }
         li{
           
            border: 2px solid rgb(83, 136, 160);
            margin: 2px;

         }
         
    </style>
</head>
<body id="body">
    <h1> Explore event bubble</h1>
    <section id="list-contenner">
        <h3> list of think </h3>
        <ol id="item-list">
            <li id="item-1">Lorem, ipsum.</li>
            <li id="item-2">Aliquid, distinctio!</li>
            <li id="item-3">Cum, minima.</li>
            <li id="item-4">Id, cumque?</li>
            <li id="item-5">Veniam, pariatur.</li>
            <li id="item-6">Corporis, ut!</li>
        </ol>
    </section>
    
    <script>
        // list item 2 click handler
        document.getElementById('item-2')
        .addEventListener('click', function(){
            console.log ('item 2 clicked')
           // event.stopPropagation()  aita use korle sudu aiter joto gula thakbe aitai kaj korbe sudu ar kaj korbe na 
           event.stopImmediatePropagation() // aita use korle sudu aitaikaj kor be ar kicu kaj kor be na and aitai thai sima boddho thakbe ar kicui kaj korbe na 
           
        })
        
        //  ol click handler
        document.getElementById('item-list')
        .addEventListener('click', function(){
            console.log (' ol clicked')
        })
        //  ol click handler
        document.getElementById('list-contenner')
        .addEventListener('click', function(){
            console.log (' section clicked')
        })
        
        //  body click handler
        document.getElementById('body')
        .addEventListener('click', function(){
            console.log (' body clicked')
        })
        
    </script>
</body>
</html>
