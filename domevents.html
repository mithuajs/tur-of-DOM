<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM events</title>
</head>
<body>
    <h1>DOM Events</h1>

    <!-- Option  1 for even handler -->

    <button onclick="console.log(7)">click me </button>
    <button onclick="console.log(' i am click ')">click me too</button>

    <br>

    <!-- Option  2 for even handler -->
     <button onclick="MakeYellow()"> MAke yellow</button>
     <button onclick="MakeBlue()"> Make blue</button>
     <br>

     <!-- options 3 for event handler -->

     <button id="gray-btn">Make gray</button>


     <!-- options 4 for event handler -->
        <button id="pink-btn">Make pink</button>
     <script>
        //get element by id.add event listener
        document.getElementById('pink-btn').addEventListener('click', function(){
            document.body.style.backgroundColor = 'pink';
        })

     
     </script>





    <script src="./js/events.js"></script>
</body>
</html>
